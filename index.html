  font-family: var(--font-body);
  font-size: 17px;
  font-style: italic;
  font-weight: 400;
  color: var(--accent-yellow);
  line-height: 1.5;
  margin: 0 0 18px;
  padding: 0 0 0 14px;

  letter-spacing: 0.005em;
}

.recon-brief .recon-brief-why {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  margin-top: 0;
  margin-bottom: 16px;
  padding-top: 0;
  border-top: none;
}

.recon-brief .recon-brief-why-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  color: var(--accent-green);
  flex-shrink: 0;
  padding-top: 2px;
  text-transform: uppercase;
}

.recon-brief .recon-brief-why-text {
  font-family: var(--font-body);
  font-size: 13.5px;
  line-height: 1.6;
  color: var(--text);
  font-weight: 300;
  font-style: normal;
}

.recon-brief-toggle {
  margin-top: 4px;
  width: 100%;
  background: transparent;
  border: 1px dashed var(--border-light);
  color: var(--text-dim);
  padding: 11px 14px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: all 0.2s;
}

.recon-brief-toggle:hover {
  color: var(--accent-yellow);
  border-color: var(--accent-yellow);
  background: var(--wash-yellow-003);
}

.recon-brief-toggle-icon {
  font-size: 14px;
  font-weight: 400;

}

  display: inline-block;
  margin-left: 10px;
  font-size: 0.6em;
  color: var(--text-meta);
  font-weight: 400;
  transition: transform 0.2s ease, color 0.2s ease;
  vertical-align: middle;
}

/* ============================================================
   PRINCIPLE PASS — strategist voice + leverage line
   ============================================================ */
.recon-footer-strong {
  color: var(--accent-yellow);
  font-style: normal;
  font-weight: 500;
  letter-spacing: 0.04em;
}

   ================================================================ */

  margin: 0 0 10px;

.contact-success-mark {
  display: inline-block;
  width: 44px;
  height: 44px;
  border: 1.5px solid var(--neon-green);

  margin-bottom: 14px;

.contact-success-title {
  font-family: var(--font-display);
  color: var(--white);
  font-size: 22px;
  margin-bottom: 8px;

.contact-success-sub {
  color: var(--text-dim);
  font-size: 13px;

   RECON COMPLETE — fullscreen modal overlay
   ================================================================ */

/* ============================================================
   LIGHT MODE — engineering graph paper + brutalist ink.
   Brightness comes from PIGMENT + FILLS, not from glowing text.
   Yellow never sets type; it highlights, fills, and rules.
   ============================================================ */
html[data-theme="light"] {
  --black: #fbfaf6;          /* bright paper */
  --dark:  #f7f4ec;          /* cream band */
  --card:  #ffffff;          /* clean panel on graph paper */
  --surface-deep: #f0ece1;
  /* In dark, "raised" lifts ABOVE --card (#151515 -> #1a1a1a). You can't lift
     above white, so on paper it inverts: raised = a warm tint. Without this it
     collapsed to #ffffff == --card and killed 5 hover/active states, including
     .phase-card.active (the LIVE phase looked unselected). */
  --surface-raised: #f1ede2;

  --border: #ddd7c9;
  --border-light: #b9b2a1;

  --text: #2a2620;

const { useState, useEffect, useRef, useCallback } = React;

/* ================================================================
   SCROLL REVEAL HOOK
   ================================================================ */
function useReveal(threshold = 0.15) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(
      ([entry]) => { if (entry.isIntersecting) { setVisible(true); obs.disconnect(); } },
      { threshold }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return [ref, visible];
}

/* ================================================================
   MARQUEE BAR
   ================================================================ */
function Marquee({ items }) {
  const doubled = [...items, ...items];
  return (
    <div className="marquee-bar">
      <div className="marquee-track">
        {doubled.map((item, i) => (
          <React.Fragment key={i}>
            <span>{item}</span>
            <span className="dot">*</span>
          </React.Fragment>
        ))}
      </div>
    </div>
  );
}

/* ================================================================

function Nav({ onDiagnostic, onContact }) {
  const [open, setOpen] = useState(false);
  const [scrolled, setScrolled] = useState(false);
  const [activeId, setActiveId] = useState('');

  useEffect(() => {
    const handler = () => setScrolled(window.scrollY > 60);
    window.addEventListener('scroll', handler, { passive: true });
    return () => window.removeEventListener('scroll', handler);
  }, []);

  // Track which section is currently in viewport
  useEffect(() => {
    const sectionIds = ['how', 'diagnostic', 'departments', 'difference'];
    const sections = sectionIds
      .map(id => document.getElementById(id))
      .filter(Boolean);

    if (sections.length === 0) return;

    const observer = new IntersectionObserver(
      (entries) => {
        // Pick the entry with the highest intersection ratio that is intersecting
        const visible = entries
          .filter(e => e.isIntersecting)
          .sort((a, b) => b.intersectionRatio - a.intersectionRatio);
        if (visible.length > 0) {
          setActiveId(visible[0].target.id);
        }
      },
      { rootMargin: '-35% 0px -45% 0px', threshold: [0, 0.25, 0.5, 0.75, 1] }
    );

    sections.forEach(s => observer.observe(s));
    return () => observer.disconnect();
  }, []);

  const scrollTo = (id) => {
    setOpen(false);
    document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' });
  };

  const linkClass = (id) => `nav-link${activeId === id ? ' active' : ''}`;

/* ================================================================
   RECON — Run Terminal (processing view)
   ================================================================ */
function RunTerminal({ procLines, bottleneckLabel }) {
  const bodyRef = useRef(null);

  useEffect(() => {
    if (bodyRef.current) {
      bodyRef.current.scrollTop = bodyRef.current.scrollHeight;
    }
  }, [procLines]);

  return (
    <div className="run-terminal">
      <div className="run-terminal-header">
        <div className="terminal-dots">
          <div className="terminal-dot"></div>
          <div className="terminal-dot"></div>
          <div className="terminal-dot"></div>
        </div>
        <div className="terminal-title">
          obsolete@recon ~ / running_{bottleneckLabel.replace(/[^a-z]/gi, '_').toLowerCase()}.log
        </div>
        <div className="terminal-indicator">
          <span className="dot"></span>RUNNING
        </div>
      </div>
      <div className="run-terminal-body" ref={bodyRef}>
        {procLines.map((line, i) => {
          const mark = line.kind === 'done' ? '\u2713'
                     : line.kind === 'route' ? '\u25B8'
                     : line.kind === 'agent' ? '\u25CF'
                     : '>';
          const markClass = line.kind === 'done' ? 'green'
                          : line.kind === 'agent' ? line.color
                          : line.kind === 'route' ? 'yellow'
                          : 'meta';
          return (
            <div className="terminal-line" key={i}>
              <span className={`run-term-mark ${markClass}`}>{mark}</span>
              <span className={`term-agent ${line.color}`}>{line.agent}</span>
              <span className="term-arrow">&gt;</span>
              <span className="term-msg">{line.msg}</span>
            </div>
          );
        })}
        <div className="terminal-cursor">_</div>
      </div>
    </div>
  );
}

/* ================================================================

   ================================================================ */
const BRIEF_TYPE_META = {
  content:     { label: 'CONTENT BRIEF',      accent: 'pink'   },
  media:       { label: 'MEDIA BRIEF',        accent: 'violet' },
  hybrid:      { label: 'CREATIVE + MEDIA',   accent: 'amber'  },
  pr:          { label: 'PR BRIEF',           accent: 'yellow' },
  lifecycle:   { label: 'LIFECYCLE BRIEF',    accent: 'amber'  },
  strategy:    { label: 'STRATEGY DOC',       accent: 'cyan'   },
  positioning: { label: 'POSITIONING DOC',    accent: 'green'  },
};

function extractHook(brief) {
  if (brief.rows && Array.isArray(brief.rows)) {
    const hookRow = brief.rows.find(r => r.hl);
    if (hookRow) return hookRow.v;
  }
  if (brief.briefType === 'hybrid' && brief.creative && brief.creative.hook) {
    return brief.creative.hook;
  }
  if (brief.briefType === 'positioning' && brief.thesis) {
    return brief.thesis;
  }
  if (brief.briefType === 'lifecycle' && brief.sequence && brief.sequence[0]) {
    return brief.sequence[0].hook;
  }
  if (brief.briefType === 'strategy' && brief.cadence) {
    return brief.cadence;
  }
  return null;
}

  const [ref, visible] = useReveal();
  const [step, setStep] = useState(0);
  const [data, setData] = useState({ category: '', brand: '', differentiator: '', competitors: '', bottlenecks: [] });
  const [procLines, setProcLines] = useState([]);
  const [showOutput, setShowOutput] = useState(false);
  const [apiResult, setApiResult] = useState(null);
  const [apiError, setApiError] = useState(null);
  const [reconModalOpen, setReconModalOpen] = useState(false);

  // Auto-open the recon modal when output is ready; lock body scroll while open.
  useEffect(() => {
    if (step === 3 && showOutput) setReconModalOpen(true);
  }, [step, showOutput]);

  useEffect(() => {
    if (!reconModalOpen) return;
    const onKey = (e) => { if (e.key === 'Escape') setReconModalOpen(false); };
    window.addEventListener('keydown', onKey);
    document.body.style.overflow = 'hidden';
    return () => {
      window.removeEventListener('keydown', onKey);
      document.body.style.overflow = '';
    };
  }, [reconModalOpen]);

  // React to hero's recon starter — pre-fill category and advance to step 1
  useEffect(() => {
    if (reconStarter && reconStarter.signal && reconStarter.category) {
      setData(prev => ({ ...prev, category: reconStarter.category }));
      setStep(1);
      setProcLines([]);
      setShowOutput(false);
      setReconModalOpen(false);
    }
  }, [reconStarter && reconStarter.signal]);

  const update = (field) => (e) => setData({ ...data, [field]: e.target.value });
  const toggleBottleneck = (id) => setData(prev => {
    const current = prev.bottlenecks || [];
    if (current.includes(id)) {
      return { ...prev, bottlenecks: current.filter(b => b !== id) };
    }
    if (current.length >= 3) return prev; // cap at 3
    return { ...prev, bottlenecks: [...current, id] };
  });

  const canAdvance = () => {
    if (step === 0) return data.category.trim().length > 0;
    if (step === 1) return data.brand.trim().length > 0 && (data.bottlenecks || []).length > 0;
    return true;
  };

  const startProcessing = () => {
    setStep(2);
    setProcLines([]);
    setApiResult(null);
    setApiError(null);

    // Kick off the real Claude API call in parallel with the animation.
    fetch('/api/recon', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({
        category: data.category,
        brand: data.brand,
        differentiator: data.differentiator,
        competitors: data.competitors,
        bottlenecks: data.bottlenecks,
      }),
    })
      .then((r) => r.ok ? r.json() : r.json().then((j) => Promise.reject(j)))
      .then((result) => setApiResult(result))
      .catch((err) => {
        console.error('Recon API error:', err);
        setApiError(err);
      });

    const selectedBottlenecks = data.bottlenecks || [];
    const primaryBottleneck = selectedBottlenecks[0] || '';
    const bottleneckLabel = selectedBottlenecks
      .map(id => BOTTLENECKS.find(b => b.id === id)?.label.toLowerCase())
      .filter(Boolean)
      .join(' + ') || 'your bottleneck';

    // Merge department routing across all selected bottlenecks (dedupe by name)
    const allDepts = [];
    const seenDepts = new Set();
    selectedBottlenecks.forEach(id => {
      const r = DEPARTMENT_MAP[id];
      if (!r || !r.depts) return;
      r.depts.forEach(d => {
        if (!seenDepts.has(d.name)) {
          seenDepts.add(d.name);
          allDepts.push(d);
        }
      });
    });
    const deptRouting = { depts: allDepts };
    const primary = (allDepts[0] && allDepts[0].name) || 'BRAND INTELLIGENCE';
    const allAgents = allDepts.flatMap(d => d.agents.map(a => ({ ...a, dept: d.name })));

    const lines = [
      // Phase 1: Scan (0-3s)
      { delay: 100,   kind: 'scan',  agent: 'SYSTEM',         color: 'violet', msg: `scanning "${data.category}" landscape` },
      { delay: 800,   kind: 'done',  agent: 'TREND-SCOUT',    color: 'pink',   msg: '2,847 signals indexed' },
      { delay: 1500,  kind: 'done',  agent: 'COMP-WATCH',     color: 'pink',   msg: `${data.competitors || 'category leaders'} logged to watch list` },
      { delay: 2200,  kind: 'done',  agent: 'AUDIENCE-MAP',   color: 'amber',  msg: 'audience segments read' },
      // Phase 2: Intelligence Brief (3-5s) — standard weekly artifact
      { delay: 3200,  kind: 'scan',  agent: 'INTEL-ENGINE',   color: 'cyan',   msg: 'generating weekly intelligence brief (standard)' },
      { delay: 4300,  kind: 'done',  agent: 'INTEL-ENGINE',   color: 'green',  msg: 'intelligence brief compiled \u00b7 feeding all departments' },
      // Phase 3: Route (5-7s)
      { delay: 5400,  kind: 'route', agent: 'SIGNAL-ROUTER',  color: 'yellow', msg: `"${bottleneckLabel}" \u2192 ${primary}` },
      { delay: 6400,  kind: 'route', agent: 'ORCHESTRATOR',   color: 'yellow', msg: `activating ${(deptRouting?.depts || []).length} specialist team${(deptRouting?.depts || []).length > 1 ? 's' : ''}` },
      // Phase 4: Agents online (7-7 + 1.1 * n)
      ...allAgents.map((a, i) => ({
        delay: 7500 + i * 1100,
        kind: 'agent',
        agent: a.name,
        color: a.color,
        msg: `online \u00b7 ${a.dept.toLowerCase()}`,
      })),
    ];

    const afterAgentsDelay = 7500 + allAgents.length * 1100 + 500;

    lines.push(
      // Phase 5: Analysis
      { delay: afterAgentsDelay,         kind: 'scan', agent: 'ANALYSIS',     color: 'cyan',   msg: 'cross-referencing category signals against bottleneck' },
      { delay: afterAgentsDelay + 1500,  kind: 'scan', agent: 'GAP-ANALYZER', color: 'pink',   msg: 'mapping competitive gaps \u2014 open lanes identified' },
      { delay: afterAgentsDelay + 3000,  kind: 'scan', agent: 'STRATEGY',     color: 'violet', msg: 'synthesizing 3-brief distribution across departments' },
      { delay: afterAgentsDelay + 4500,  kind: 'scan', agent: 'BRIEF-WRITER', color: 'amber',  msg: 'generating targeted briefs per department spec' },
      // Phase 6: Done
      { delay: afterAgentsDelay + 6000,  kind: 'done', agent: 'INTEL',        color: 'green',  msg: '3 signals \u00b7 1 window \u00b7 open lane identified' },
      { delay: afterAgentsDelay + 7300,  kind: 'done', agent: 'BRIEFS',       color: 'green',  msg: '3 briefs compiled \u00b7 tuned to bottleneck' },
      { delay: afterAgentsDelay + 8500,  kind: 'done', agent: 'RECON',        color: 'green',  msg: 'complete. compiling output...' },
    );

    lines.forEach((line) => {
      setTimeout(() => {
        setProcLines(prev => [...prev, line]);
      }, line.delay);
    });

    setTimeout(() => {
      setStep(3);
      setShowOutput(true);
    }, afterAgentsDelay + 10000);
  };

  const reset = () => {
    setStep(0);
    setData({ category: '', brand: '', differentiator: '', competitors: '', bottlenecks: [] });
    setProcLines([]);
    setShowOutput(false);
    setApiResult(null);
    setApiError(null);
    setReconModalOpen(false);
  };

  const bottleneckObjs = (data.bottlenecks || []).map(id => BOTTLENECKS.find(b => b.id === id)).filter(Boolean);
  const primaryBottleneckObj = bottleneckObjs[0] || BOTTLENECKS[0];
  const output = apiResult || RECON_OUTPUTS[(data.bottlenecks && data.bottlenecks[0]) || 'awareness'] || RECON_OUTPUTS.awareness;

  // Merge departments across all selected bottlenecks, dedupe by name
  const mergedDeptRouting = (() => {
    if (!data.bottlenecks || data.bottlenecks.length === 0) return null;
    const allDepts = [];
    const seen = new Set();
    data.bottlenecks.forEach(id => {
      const r = DEPARTMENT_MAP[id];
      if (!r || !r.depts) return;
      r.depts.forEach(d => {
        if (!seen.has(d.name)) {
          seen.add(d.name);
          allDepts.push(d);
        }
      });
    });
    return { depts: allDepts };
  })();

  const statusText = step === 0 ? 'AWAITING INPUT' : step === 1 ? 'STEP 2 OF 2' : step === 2 ? 'PROCESSING...' : 'COMPLETE';
  const statusColor = step === 3 ? 'var(--neon-green)' : step === 2 ? 'var(--neon-yellow)' : 'var(--text-meta)';

  return (
    <section className="section diag-section" id="diagnostic">
      <div className={`section-inner reveal ${visible ? 'visible' : ''}`} ref={ref}>
        <div className="diag-header">
          <h2 className="diag-title">RUN A RECON</h2>
          <p className="diag-sub">
            Watch the engine turn category intelligence into briefs your team could ship this week. 30 seconds, no email required.
          </p>
        </div>

        <div className="diag-layout">
        <div className="diag-container">
          <div className="diag-topbar">
            <div className="diag-topbar-dots">
              <div className="diag-topbar-dot"></div>
              <div className="diag-topbar-dot"></div>
              <div className="diag-topbar-dot"></div>
            </div>
            <div className="diag-topbar-title">OBSOLETE RECON v1.0</div>
            {step !== 3 && (
              <div className="diag-topbar-status" style={{ color: statusColor }}>
                {statusText}
              </div>
            )}
          </div>

          <div className="diag-body">
            {/* STEP 0: Category */}
            {step === 0 && (
              <div className="diag-step" key="step0">
                <div className="diag-question">
                  What category does your brand operate in?
                </div>
                <div className="diag-input-group">
                  <div className="diag-input-label">Category</div>
                  <input
                    className="diag-input"
                    type="text"
                    placeholder="e.g., plant-based beverages, DTC skincare, fitness apparel"
                    value={data.category}
                    onChange={update('category')}
                    onKeyDown={(e) => e.key === 'Enter' && canAdvance() && setStep(1)}
                  />
                </div>
                <div className="diag-nav">
                  <div className="diag-step-indicator">01 / 02</div>
                  <button
                    className="diag-next"
                    disabled={!canAdvance()}
                    onClick={() => setStep(1)}
                  >
                    Continue &rarr;
                  </button>
                </div>
              </div>
            )}

            {/* STEP 1: Brand Details */}
            {step === 1 && (
              <div className="diag-step" key="step1">
                <div className="diag-question">
                  Tell us about your brand.
                </div>
                <div className="diag-input-group">
                  <div className="diag-input-label">Brand Name</div>
                  <input
                    className="diag-input"
                    type="text"
                    placeholder="Your brand name"
                    value={data.brand}
                    onChange={update('brand')}
                    autoFocus
                  />
                </div>
                <div className="diag-input-group">
                  <div className="diag-input-label diag-input-label-row">
                    <span>What's holding you back? (pick up to 3)</span>
                    <span className={`diag-chip-counter${(data.bottlenecks || []).length >= 3 ? ' full' : ''}`}>
                      {(data.bottlenecks || []).length} / 3
                    </span>
                  </div>
                  <div className="diag-chips">
                    {BOTTLENECKS.map((b) => {
                      const isSelected = (data.bottlenecks || []).includes(b.id);
                      const atCap = (data.bottlenecks || []).length >= 3 && !isSelected;
                      return (
                        <button
                          key={b.id}
                          type="button"
                          disabled={atCap}
                          className={`diag-chip${isSelected ? ' selected' : ''}${atCap ? ' disabled' : ''}`}
                          onClick={() => toggleBottleneck(b.id)}
                          style={{
                            '--chip-color': b.color,
                            '--chip-bg': b.color === 'var(--neon-yellow)'
                              ? 'rgba(232, 255, 0, 0.06)'
                              : b.color === 'var(--neon-cyan)'
                                ? 'rgba(0, 240, 255, 0.06)'
                                : b.color === 'var(--neon-pink)'
                                  ? 'rgba(255, 45, 107, 0.06)'
                                  : b.color === 'var(--neon-green)'
                                    ? 'rgba(0, 255, 136, 0.06)'
                                    : b.color === 'var(--neon-violet)'
                                      ? 'rgba(168, 85, 247, 0.08)'
                                      : 'rgba(255, 170, 0, 0.06)',
                          }}
                        >
                          <span className="chip-marker"></span>{b.label}
                        </button>
                      );
                    })}
                  </div>
                </div>
                <div className="diag-input-group">
                  <div className="diag-input-label">What makes you different? (optional)</div>
                  <input
                    className="diag-input"
                    type="text"
                    placeholder="One sentence about your positioning"
                    value={data.differentiator}
                    onChange={update('differentiator')}
                  />
                </div>
                <div className="diag-input-group">
                  <div className="diag-input-label">1-2 competitors you watch (optional)</div>
                  <input
                    className="diag-input"
                    type="text"
                    placeholder="e.g., Oatly, Califia Farms"
                    value={data.competitors}
                    onChange={update('competitors')}
                    onKeyDown={(e) => e.key === 'Enter' && canAdvance() && startProcessing()}
                  />
                </div>
                <div className="diag-nav">
                  <button className="diag-back" onClick={() => setStep(0)}>&larr; Back</button>
                  <div className="diag-step-indicator">02 / 02</div>
                  <button
                    className="diag-next"
                    disabled={!canAdvance()}
                    onClick={startProcessing}
                  >
                    Run Recon &rarr;
                  </button>
                </div>
              </div>
            )}

            {/* STEP 2: Processing — terminal style */}
            {step === 2 && (
              <div className="diag-step" key="step2">
                <RunTerminal procLines={procLines} bottleneckLabel={primaryBottleneckObj.label} />
              </div>
            )}

            {/* STEP 3: Output (inline view — visible after the user closes the fullscreen modal) */}
            {step === 3 && showOutput && (
              <div className="diag-step" key="step3">
                <ReconOutput data={data} bottlenecks={bottleneckObjs} output={output} deptRouting={mergedDeptRouting} />
                <div className="diag-output-ctas">
                  <button
                    className="btn-primary"
                    onClick={() => onContact?.({
                      category: data.category,
                      brand: data.brand,
                      bottlenecks: bottleneckObjs.map(b => b.label).join(', '),
                    })}
                  >
                    Contact Us <span style={{ fontSize: 16 }}>&rarr;</span>
                  </button>
                  <button className="btn-outline" onClick={() => setReconModalOpen(true)}>
                    Re-open Full View
                  </button>
                  <button className="btn-outline" onClick={reset}>
                    Run Again
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
        <div className="diag-gif" aria-hidden="true">
          <img src="https://i.postimg.cc/wjdgF7Xz/Screen-Recording2026-04-13at4-53-55PM-ezgif-com-video-to-gif-converter.gif" alt="" />
        </div>
        </div>
      </div>

      {/* RECON COMPLETE — fullscreen modal overlay */}
      {reconModalOpen && step === 3 && showOutput && (
        <div
          className="recon-modal-overlay"
          onClick={(e) => { if (e.target === e.currentTarget) setReconModalOpen(false); }}
        >
          <div className="recon-modal-frame">
            <div className="recon-modal-topbar">
              <div className="recon-modal-topbar-left">
                <div className="diag-topbar-dots">
                  <div className="diag-topbar-dot"></div>
                  <div className="diag-topbar-dot"></div>
                  <div className="diag-topbar-dot"></div>
                </div>
                <div className="recon-modal-status">
                  <span className="dot"></span>RECON COMPLETE
                </div>
              </div>
              <button
                className="contact-close"
                onClick={() => setReconModalOpen(false)}
                aria-label="Close"
              >{'✕'}</button>
            </div>
            <div className="recon-modal-body">
              <ReconOutput data={data} bottlenecks={bottleneckObjs} output={output} deptRouting={mergedDeptRouting} />
            </div>
            <div className="recon-modal-ctas">
              <button className="btn-outline" onClick={reset}>
                Run Again
              </button>
              <button
                className="btn-primary"
                onClick={() => onContact?.({
                  category: data.category,
                  brand: data.brand,
                  bottlenecks: bottleneckObjs.map(b => b.label).join(', '),
                })}
              >
                Contact Us <span style={{ fontSize: 16 }}>&rarr;</span>
              </button>
            </div>
          </div>
        </div>
      )}
    </section>
  );
}

      document.body.style.overflow = '';
    };
  }, [open, onClose]);

  React.useEffect(() => {
    if (open && context && context.brand && !brand) {
      setBrand(context.brand);
    }
  }, [open, context]);

  if (!open) return null;

  const reset = () => {
    setName(''); setEmail(''); setBrand(''); setMessage('');
    setStatus('idle'); setErrorMsg('');
  };

  const handleClose = () => {
    if (status === 'success') reset();
    onClose();
  };

  const handleSubmit = async (e) => {
    e.preventDefault();
    if (status === 'sending') return;
    setStatus('sending');
    setErrorMsg('');

    const payload = {
      name,
      email,
      brand,
      message,
      _subject: `OBSOLETE site lead${brand ? ' — ' + brand : ''}`,
    };
    if (context) {
      if (context.category) payload.recon_category = context.category;
      if (context.bottlenecks) payload.recon_bottlenecks = context.bottlenecks;
      payload.lead_source = 'recon-complete';
    } else {
      payload.lead_source = 'nav-contact';
    }

    try {
      const res = await fetch(FORMSPREE_ENDPOINT, {
        method: 'POST',
        headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      if (res.ok) {
        setStatus('success');
      } else {
        const body = await res.json().catch(() => ({}));
        setStatus('error');
        setErrorMsg(body?.errors?.[0]?.message || 'Send failed. Please try again in a moment.');
      }
    } catch (err) {
      setStatus('error');
      setErrorMsg('Network error. Please try again in a moment.');
    }
  };

  const onBackdrop = (e) => { if (e.target === e.currentTarget) handleClose(); };

  return (
    <div className="contact-overlay" onClick={onBackdrop}>
      <div className="contact-card">
        <div className="contact-topbar">
          <div className="contact-topbar-title">OBSOLETE // CONTACT</div>
          <button className="contact-close" onClick={handleClose} aria-label="Close">{'✕'}</button>
        </div>
        <div className="contact-body">
          {status === 'success' ? (
            <div className="contact-success">
              <div className="contact-success-mark">{'✓'}</div>
              <div className="contact-success-title">Message received.</div>
              <div className="contact-success-sub">
                We'll reach out within 24 hours.{context ? ' Your recon context came through.' : ''}
              </div>
            </div>
          ) : (
            <>
              <div className="contact-eyebrow">// LET'S TALK</div>
              <h3 className="contact-title">
                {context ? 'Want this running on your brand?' : 'Tell us about your brand.'}
              </h3>
              <p className="contact-sub">
                {context
                  ? "Drop your details — we'll send back what a 30-Day Quest would look like for you."
                  : "Quick intro. We'll get back within 24 hours with a real next step, not a calendar link."}
              </p>

              {context && (context.category || context.bottlenecks) && (
                <div className="contact-context">
                  <div className="contact-context-label">// FROM YOUR RECON</div>
                  {context.category && (
                    <div className="contact-context-row">
                      <span className="contact-context-key">Category</span>
                      <span className="contact-context-val">{context.category}</span>
                    </div>
                  )}
                  {context.brand && (
                    <div className="contact-context-row">
                      <span className="contact-context-key">Brand</span>
                      <span className="contact-context-val">{context.brand}</span>
                    </div>
                  )}
                  {context.bottlenecks && (
                    <div className="contact-context-row">
                      <span className="contact-context-key">Bottleneck</span>
                      <span className="contact-context-val">{context.bottlenecks}</span>
                    </div>
                  )}
                </div>
              )}

              <form onSubmit={handleSubmit}>
                {errorMsg && <div className="contact-error">{errorMsg}</div>}
                <div className="contact-field">
                  <label className="contact-field-label">Your name</label>
                  <input
                    className="contact-input"
                    type="text"
                    value={name}
                    onChange={(e) => setName(e.target.value)}
                    required
                  />
                </div>
                <div className="contact-field">
                  <label className="contact-field-label">Email</label>
                  <input
                    className="contact-input"
                    type="email"
                    value={email}
                    onChange={(e) => setEmail(e.target.value)}
                    required
                  />
                </div>
                <div className="contact-field">
                  <label className="contact-field-label">Brand / company</label>
                  <input
                    className="contact-input"
                    type="text"
                    value={brand}
                    onChange={(e) => setBrand(e.target.value)}
                  />
                </div>
                <div className="contact-field">
                  <label className="contact-field-label">What's the gap?</label>
                  <textarea
                    className="contact-textarea"
                    value={message}
                    onChange={(e) => setMessage(e.target.value)}
                    placeholder={context ? 'Anything to add beyond your recon answers...' : 'What you’re trying to fix, what’s not working.'}
                    rows={4}
                  />
                </div>
                <div className="contact-actions">
                  <button type="button" className="btn-outline" onClick={handleClose}>Cancel</button>
                  <button type="submit" className="btn-primary" disabled={status === 'sending'}>
                    {status === 'sending' ? 'Sending…' : 'Send'} <span style={{ fontSize: 15 }}>&rarr;</span>
                  </button>
                </div>
              </form>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [reconStarter, setReconStarter] = useState({ category: '', signal: 0 });
  const [contactState, setContactState] = useState({ open: false, context: null });

  const openContact = (context) => setContactState({ open: true, context: context || null });
  const closeContact = () => setContactState({ open: false, context: null });

  const startRecon = (category) => {
    setReconStarter({ category: category || '', signal: Date.now() });
    setTimeout(() => {
      document.getElementById('diagnostic')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 80);
  };

  const scrollToDiag = () => {
    document.getElementById('diagnostic')?.scrollIntoView({ behavior: 'smooth' });
  };

  const marqueeItems = [
    'SELF-DRIVING MARKETING',
    'DEPARTMENTS NOT TOOLS',
    'ENGINES NOT PROMPTS',
    'INTELLIGENCE \u2192 ACTION',
    'INTELLIGENCE NOT CONTENT',
    'DESIGNED TO NOT BE NEEDED',
    'AUTHENTIC NOT SYNTHETIC',
    'EQUITY NOT DEBT',
    'COMPOUNDING OVER STATIC',
  ];

  return (
    <>
      <Nav onDiagnostic={scrollToDiag} onContact={() => openContact(null)} />
      <Hero onStartRecon={startRecon} />
      <Marquee items={[
        'SOCIAL ENGINE',
        'MEDIA PLANNING',
        'BRAND INTELLIGENCE',
        'CONTENT PRODUCTION',
        'CRM + LIFECYCLE',
        'PR + EARNED MEDIA',
      ]} />
      <Departments />
      <Marquee items={marqueeItems} />
      <Quest />
      <HowItWorks />
      <Diagnostic reconStarter={reconStarter} onContact={openContact} />
      <Difference />
      {/* <Agencies /> -- HIDDEN: see Agencies() component + .agencies-* CSS, both retained for re-enable */}
      <Proof />
      <Marquee items={marqueeItems} />
      <CTA />
      <footer className="footer">
        <div className="footer-left">
          <span style={{ color: 'var(--accent-yellow)' }}>//</span> OBSOLETE INTELLIGENCE SYSTEMS
          <span style={{ margin: '0 8px', color: 'var(--border-light)' }}>/</span> EST. 2026
        </div>
        <div className="footer-right">
          DESIGNED TO NOT BE NEEDED
        </div>
      </footer>
      <ContactModal
        open={contactState.open}
        onClose={closeContact}
        context={contactState.context}
      />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
