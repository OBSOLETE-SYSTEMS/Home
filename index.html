<style>
/* ============================================================
   OBSOLETE — Premium Brutalist Aesthetic
   Editorial zine meets terminal. Dark, loud, deliberately imperfect.
   ============================================================ */

/* --- Reset & Base --- */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --black: #0a0a0a;
  --dark: #111111;
  --card: #151515;
  --border: #2a2a2a;
  --border-light: #333333;
  --text: #e8e4df;
  --text-dim: #8a8680;
  --text-meta: #5a5652;
  --white: #f0ece6;

  /* rotating neon accents */
  --neon-yellow: #e8ff00;
  --neon-cyan: #00f0ff;
  --neon-pink: #ff2d6b;
  --neon-violet: #a855f7;
  --neon-green: #00ff88;
  --neon-amber: #ffaa00;

  --font-display: 'Bebas Neue', sans-serif;
  --font-body: 'Inter', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', monospace;

  --scanline-opacity: 0.03;
  --grain-opacity: 0.04;

  /* --- surfaces (tokenized) --- */
  --surface-deep: #0d0d0d;
  --surface-raised: #1a1a1a;
  --nav-bg: rgba(10, 10, 10, 0.9);
  --terminal-bg: rgba(10, 10, 10, 0.85);
  --scrim: rgba(0, 0, 0, 0.82);
  --scrim-strong: rgba(0, 0, 0, 0.88);
  --scanline-color: rgba(0, 0, 0, var(--scanline-opacity));
  --lift-1: rgba(255, 255, 255, 0.03);
  --lift-2: rgba(255, 255, 255, 0.06);
  --grid-img: none;

  /* --- text accents: dark mode = the neons themselves --- */
  --accent-yellow: var(--neon-yellow);
  --accent-cyan:   var(--neon-cyan);
  --accent-pink:   var(--neon-pink);
  --accent-violet: var(--neon-violet);
  --accent-green:  var(--neon-green);
  --accent-amber:  var(--neon-amber);
  --accent-red:    var(--neon-pink);
  --accent-orange: var(--neon-amber);

  --diff-old: #c0988a;
  --error-text: #ff7a7a;
  --dept-hover-bg: #181818;
  --on-accent: #0a0a0a;
  --btn-hover-bg: var(--white);
  --btn-hover-fg: #0a0a0a;

  /* --- generated neon washes / lines --- */
  --line-amber-035: rgba(255, 170, 0, 0.35);
  --line-cyan-035: rgba(0, 240, 255, 0.35);
  --line-green-03: rgba(0, 255, 136, 0.3);
  --line-green-035: rgba(0, 255, 136, 0.35);
  --line-pink-035: rgba(255, 45, 107, 0.35);
  --line-violet-04: rgba(168, 85, 247, 0.4);
  --line-yellow-018: rgba(232, 255, 0, 0.18);
  --line-yellow-03: rgba(232, 255, 0, 0.3);
  --line-yellow-035: rgba(232, 255, 0, 0.35);
  --wash-amber-0025: rgba(255, 170, 0, 0.025);
  --wash-amber-005: rgba(255, 170, 0, 0.05);
  --wash-cyan-005: rgba(0, 240, 255, 0.05);
  --wash-green-003: rgba(0, 255, 136, 0.03);
  --wash-green-005: rgba(0, 255, 136, 0.05);
  --wash-pink-005: rgba(255, 45, 107, 0.05);
  --wash-violet-006: rgba(168, 85, 247, 0.06);
  --wash-yellow-002: rgba(232, 255, 0, 0.02);
  --wash-yellow-003: rgba(232, 255, 0, 0.03);
  --wash-yellow-004: rgba(232, 255, 0, 0.04);
  --wash-yellow-005: rgba(232, 255, 0, 0.05);
  --wash-yellow-006: rgba(232, 255, 0, 0.06);
}

html {
  scroll-behavior: smooth;
  scrollbar-width: thin;
  scrollbar-color: var(--neon-yellow) var(--black);
}

/* Custom scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--black); }
::-webkit-scrollbar-thumb { background: var(--neon-yellow); border-radius: 0; }

body {
  font-family: var(--font-body);
  background: var(--black);
  color: var(--text);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  line-height: 1.6;
}

/* --- CRT Scanlines Overlay --- */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    var(--scanline-color) 2px,
    var(--scanline-color) 4px
  );
  pointer-events: none;
  z-index: 10000;
}

/* --- Film Grain Overlay (removed: 2x viewport animated SVG was the largest compositor cost on the page) --- */

/* --- Global Typography --- */
.label {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-meta);
}

.mono {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-dim);
}

.display {
  font-family: var(--font-display);
  line-height: 0.9;
  letter-spacing: 0.02em;
}

/* --- Glitch Effect --- */
.glitch-hover {
  position: relative;
  display: inline-block;
}

.glitch-hover:hover {
  animation: glitch-text 0.3s ease;
}

@keyframes glitch-text {
  0% { transform: translate(0); }
  20% { transform: translate(-2px, 1px); }
  40% { transform: translate(2px, -1px); }
  60% { transform: translate(-1px, -1px); }
  80% { transform: translate(1px, 1px); }
  100% { transform: translate(0); }
}

/* --- Reveal on Scroll --- */
.reveal {
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1),
              transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}

.reveal.visible {
  opacity: 1;
  transform: translateY(0);
}

/* --- Tilted Cards --- */
.tilt-card {
  transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}

.tilt-left { transform: rotate(-1.2deg); }
.tilt-right { transform: rotate(1.2deg); }
.tilt-card:hover { transform: rotate(0deg) !important; }

/* --- Links & Buttons --- */
a { color: var(--accent-yellow); text-decoration: none; }
a:hover { text-decoration: underline; }

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 16px 32px;
  background: var(--neon-yellow);
  color: var(--on-accent);
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border: none;
  cursor: pointer;
  transition: all 0.2s ease;
  text-decoration: none;
}

.btn-primary:hover {
  background: var(--btn-hover-bg);
  color: var(--btn-hover-fg);
  text-decoration: none;
  transform: translate(-1px, -1px);
  box-shadow: 3px 3px 0 var(--neon-yellow);
}

.btn-outline {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 16px 32px;
  background: transparent;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border: 1px solid var(--border-light);
  cursor: pointer;
  transition: all 0.2s ease;
  text-decoration: none;
}

.btn-outline:hover {
  border-color: var(--text);
  text-decoration: none;
  transform: translate(-1px, -1px);
  box-shadow: 3px 3px 0 var(--border-light);
}

/* --- Section Container --- */
.section {
  padding: 120px 40px;
  position: relative;
}

.section-inner {
  max-width: 1200px;
  margin: 0 auto;
}

@media (max-width: 768px) {
  .section { padding: 80px 20px; }
}

/* --- Marquee --- */
.marquee-bar {
  overflow: hidden;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 14px 0;
  background: var(--dark);
}

.marquee-track {
  display: flex;
  gap: 60px;
  animation: marquee-scroll 30s linear infinite;
  white-space: nowrap;
  width: max-content;
}

.marquee-track span {
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
}

.marquee-track .dot {
  color: var(--accent-yellow);
}

@keyframes marquee-scroll {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

/* --- Blinking Cursor --- */
.cursor-blink::after {
  content: '|';
  animation: blink 1s step-end infinite;
  color: var(--accent-yellow);
  font-weight: 300;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

/* ============================================================
   NAVIGATION
   ============================================================ */
.nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 9000;
  padding: 0 40px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--nav-bg);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
}

.nav-logo {
  font-family: var(--font-display);
  font-size: 28px;
  color: var(--white);
  letter-spacing: 0.08em;
  cursor: pointer;
}

.nav-brand {
  display: flex;
  align-items: center;
  gap: 14px;
}

.nav-tagline {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent-yellow);
  border-left: 1px solid var(--border-light);
  padding-left: 14px;
  line-height: 1.3;
  max-width: 140px;
}

@media (max-width: 600px) {
  .nav-tagline { display: none; }
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 32px;
}

.nav-link {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
  cursor: pointer;
  transition: color 0.2s;
  background: none;
  border: none;
  padding: 4px 0 6px;
  position: relative;
}

.nav-link:hover { color: var(--white); text-decoration: none; }

.nav-link::after {
  content: '';
  position: absolute;
  left: 0;
  right: 100%;
  bottom: 0;
  height: 2px;
  background: var(--neon-yellow);
  transition: right 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}

.nav-link.active {
  color: var(--white);
}

.nav-link.active::after {
  right: 0;
}

.nav-cta {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 8px 18px;
  background: var(--neon-yellow);
  color: var(--on-accent);
  border: none;
  cursor: pointer;
  font-weight: 500;
  transition: all 0.15s;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
}

.nav-cta:hover {
  background: var(--btn-hover-bg);
  color: var(--btn-hover-fg);
  text-decoration: none;
  transform: translate(-1px, -1px);
  box-shadow: 2px 2px 0 var(--neon-yellow);
}

/* Mobile nav */
.nav-hamburger {
  display: none;
  background: none;
  border: none;
  color: var(--text);
  font-size: 24px;
  cursor: pointer;
}

@media (max-width: 768px) {
  .nav { padding: 0 20px; }
  .nav-links { display: none; }
  .nav-links.open {
    display: flex;
    flex-direction: column;
    position: absolute;
    top: 60px;
    left: 0;
    right: 0;
    background: var(--dark);
    border-bottom: 1px solid var(--border);
    padding: 20px;
    gap: 16px;
  }
  .nav-hamburger { display: block; }
}

/* ============================================================
   HERO
   ============================================================ */
.hero {
  min-height: auto;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 120px 40px 80px;
  position: relative;
  overflow: hidden;
}

/* Hero → Our System scroll transition band (spinning car) */
.hero-transition {
  position: relative;
  background: var(--black);
  padding: 60px 40px;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 24px;
}

.hero-transition-gif {
  width: 320px;
  max-width: 70vw;
  position: relative;
  z-index: 1;
  opacity: 0;
  transform: scale(0.92);
  transition: opacity 0.9s cubic-bezier(0.16, 1, 0.3, 1),
              transform 0.9s cubic-bezier(0.16, 1, 0.3, 1);
}

.hero-transition.visible .hero-transition-gif {
  opacity: 1;
  transform: scale(1);
}

.hero-transition-gif img {
  width: 100%;
  height: auto;
  display: block;
}

.hero-transition-tag {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--text-meta);
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  gap: 14px;
  opacity: 0;
  transition: opacity 0.7s ease 0.3s;
}

.hero-transition.visible .hero-transition-tag { opacity: 1; }

.hero-transition-tag .tag-line {
  display: inline-block;
  width: 40px;
  height: 1px;
  background: var(--text-meta);
}

.hero-transition-tag .yellow {
  color: var(--accent-yellow);
}

@media (max-width: 640px) {
  .hero-transition { padding: 48px 20px; }
  .hero-transition-gif { width: 240px; }
}

.hero-inner {
  max-width: 1240px;
  margin: 0 auto;
  width: 100%;
  display: grid;
  grid-template-columns: 1fr minmax(400px, 520px);
  gap: 56px;
  align-items: center;
  position: relative;
  z-index: 1;
}

.hero-content {
  min-width: 0;
}

.hero-howlink {
  margin-top: 28px;
  background: none;
  border: none;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-dim);
  cursor: pointer;
  padding: 0;
  transition: color 0.2s;
}

.hero-howlink:hover { color: var(--white); }

/* Recon starter in hero */
.hero-starter {
  border: 1px solid var(--border-light);
  background: var(--terminal-bg);
  backdrop-filter: blur(6px);
  position: relative;
  z-index: 1;
  box-shadow: 0 0 40px rgba(232, 255, 0, 0.04);
}

.hero-starter-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  background: var(--surface-deep);
  border-bottom: 1px solid var(--border);
  gap: 12px;
}

.hero-starter-dots {
  display: flex;
  gap: 5px;
}

.hero-starter-dots span {
  width: 8px;
  height: 8px;
}

.hero-starter-dots span:nth-child(1) { background: #ff5f57; }
.hero-starter-dots span:nth-child(2) { background: #ffbd2e; }
.hero-starter-dots span:nth-child(3) { background: #28c840; }

.hero-starter-title {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-meta);
  letter-spacing: 0.05em;
  flex: 1;
  text-align: center;
}

.hero-starter-status {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.14em;
  color: var(--accent-green);
}

.hero-starter-status .dot {
  width: 6px;
  height: 6px;
  background: var(--neon-green);
  box-shadow: 0 0 6px var(--neon-green);
  animation: pulse 1.5s ease-in-out infinite;
}

.hero-starter-body {
  padding: 28px 28px 26px;
}

.hero-starter-label {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  color: var(--accent-yellow);
  margin-bottom: 14px;
}

.hero-starter-prompt {
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 300;
  color: var(--text-dim);
  line-height: 1.6;
  margin-bottom: 26px;
}

.hero-starter-inputwrap {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 14px;
  background: var(--black);
  border: 1px solid var(--border);
  margin-bottom: 18px;
  transition: border-color 0.2s;
}

.hero-starter-inputwrap:focus-within {
  border-color: var(--accent-yellow);
}

.hero-starter-caret {
  font-family: var(--font-mono);
  color: var(--accent-yellow);
  font-size: 14px;
  flex-shrink: 0;
}

.hero-starter-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--white);
  padding: 0;
}

.hero-starter-input::placeholder {
  color: var(--text-meta);
  font-style: italic;
}

.hero-starter-btn {
  width: 100%;
  padding: 16px 20px;
  background: var(--neon-yellow);
  color: var(--on-accent);
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  border: none;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.hero-starter-btn:hover:not(:disabled) {
  background: var(--btn-hover-bg);
  color: var(--btn-hover-fg);
  transform: translate(-1px, -1px);
  box-shadow: 3px 3px 0 var(--neon-yellow);
}

.hero-starter-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.hero-starter-foot {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 14px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  color: var(--text-meta);
}

.hero-starter-foot .dot {
  width: 5px;
  height: 5px;
  background: var(--neon-yellow);
  box-shadow: 0 0 5px var(--neon-yellow);
}

@media (max-width: 900px) {
  .hero-inner {
    grid-template-columns: 1fr;
    gap: 40px;
  }
}

@media (max-width: 480px) {
  .hero { padding: 104px 20px 56px; }
  .hero-starter-body { padding: 22px 20px 20px; }
  .hero-starter-prompt { font-size: 13px; margin-bottom: 20px; }
  .hero-starter-inputwrap { padding: 12px; }
  .hero-starter-btn { padding: 14px 16px; font-size: 12px; }
  .hero-subcopy { font-size: 16px; }
}

.hero-meta {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-meta);
  margin-bottom: 40px;
}

.hero-meta .accent { color: var(--accent-yellow); }

.hero-headline {
  font-family: var(--font-display);
  font-size: clamp(56px, 9.5vw, 140px);
  line-height: 0.88;
  color: var(--white);
  margin-bottom: 16px;
}

.hero-headline .outline {
  -webkit-text-stroke: 1.5px var(--white);
  color: transparent;
}

.hero-headline .yellow { color: var(--accent-yellow); }

.hero-tagline-row {
  display: flex;
  align-items: baseline;
  gap: 24px;
  margin-bottom: 48px;
  flex-wrap: wrap;
}

.hero-subcopy {
  font-family: var(--font-body);
  font-size: 24px;
  font-weight: 400;
  line-height: 1.5;
  color: var(--text);
  max-width: 620px;
}

.hero-subcopy-tag {
  font-family: var(--font-mono);
  font-size: 14px;
  letter-spacing: 0.06em;
  color: var(--accent-yellow);
  font-weight: 500;
  white-space: nowrap;
  margin-left: 4px;
}

@media (max-width: 600px) {
  .hero-subcopy { font-size: 17px; }
  .hero-subcopy-tag { font-size: 13px; white-space: normal; display: block; margin-left: 0; margin-top: 8px; }
}

.hero-sub {
  font-family: var(--font-body);
  font-size: 17px;
  font-weight: 300;
  color: var(--text-dim);
  max-width: 520px;
  line-height: 1.7;
}

.hero-ctas {
  display: flex;

  flex-wrap: wrap;
}


@media (max-width: 768px) {
  .hero { padding: 120px 20px 60px; }
}

/* ============================================================
   HOW IT WORKS — 3-Phase
   ============================================================ */
.how-section {
  background: var(--dark);
}

.how-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 80px;
  flex-wrap: wrap;
  gap: 16px;
}

.how-title {
  font-family: var(--font-display);
  font-size: clamp(48px, 6vw, 80px);
  color: var(--white);
  line-height: 0.9;
}

.how-comment {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-meta);
}

/* --- The System: live terminal experience --- */
.system-status-bar {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 2px;
  margin-bottom: 2px;
  border: 1px solid var(--border);
  background: var(--border);
}

.system-status-item {
  background: var(--card);
  padding: 16px 20px;
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.system-status-item .status-dot {
  position: absolute;
  top: 18px;
  right: 18px;
  width: 7px;
  height: 7px;
  background: var(--neon-green);
  box-shadow: 0 0 10px var(--neon-green);
  animation: pulse 1.5s ease-in-out infinite;
}

.system-status-label {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-meta);
}

.system-status-value {
  font-family: var(--font-display);
  font-size: 22px;
  color: var(--white);
  letter-spacing: 0.04em;
  line-height: 1;
}

.system-status-value.green { color: var(--accent-green); }
.system-status-value.yellow { color: var(--accent-yellow); }

.system-grid {
  display: grid;
  /* the three phases are the message; the log is ambient proof */
  grid-template-columns: 1fr 1.1fr;
  gap: 0;
  background: var(--black);
  border: 1px solid var(--border);
}

.phase-nav {
  display: flex;
  flex-direction: column;
  gap: 0;
  background: var(--black);
}

.phase-card {
  background: var(--card);
  border: none;
  padding: 30px 32px;
  text-align: left;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  position: relative;
  font-family: inherit;
  color: inherit;
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
  justify-content: space-between;
}

.phase-card:hover {
  background: var(--surface-raised);
}

.phase-card.active {
  background: var(--surface-raised);
}

.phase-card::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  width: 3px;
  height: 100%;
  opacity: 0.25;
  transition: opacity 0.25s;
}

.phase-card.active::before { opacity: 1; }

.phase-card[data-phase="encode"]::before { background: var(--neon-cyan); }
.phase-card[data-phase="deploy"]::before { background: var(--neon-pink); }
.phase-card[data-phase="compound"]::before { background: var(--neon-green); }

.phase-number {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--text-meta);
  margin-bottom: 6px;
}

.phase-label {
  font-family: var(--font-display);
  font-size: clamp(34px, 3.2vw, 46px);
  letter-spacing: 0.04em;
  margin-bottom: 10px;
  line-height: 1;
}

.phase-card[data-phase="encode"] .phase-label { color: var(--accent-cyan); }
.phase-card[data-phase="deploy"] .phase-label { color: var(--accent-pink); }
.phase-card[data-phase="compound"] .phase-label { color: var(--accent-green); }

.phase-desc {
  font-size: 14.5px;
  font-weight: 400;
  color: var(--text);
  line-height: 1.6;
  margin: 0 0 10px 0;
}

.phase-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 10px;
  border-top: 1px solid var(--border);
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.phase-status-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.phase-status-tag .dot {
  width: 6px;
  height: 6px;
  background: currentColor;
  box-shadow: 0 0 6px currentColor;
  animation: pulse 1.5s ease-in-out infinite;
}

.phase-status-tag.live { color: var(--accent-green); }
.phase-status-tag.complete { color: var(--text-dim); }
.phase-status-tag.learning { color: var(--accent-amber); }

.phase-agents {
  color: var(--text-meta);
}

/* Terminal */
.terminal {
  background: var(--black);
  display: flex;
  flex-direction: column;
  min-height: 480px;
  max-height: 560px;
}

.terminal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 18px;
  background: var(--surface-deep);
  border-bottom: 1px solid var(--border);
  gap: 12px;
}

.terminal-dots {
  display: flex;
  gap: 6px;
}

.terminal-dot {
  width: 9px;
  height: 9px;
}

.terminal-dot:nth-child(1) { background: #ff5f57; }
.terminal-dot:nth-child(2) { background: #ffbd2e; }
.terminal-dot:nth-child(3) { background: #28c840; }

.terminal-title {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-meta);
  letter-spacing: 0.04em;
  flex: 1;
  text-align: center;
}

.terminal-indicator {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--accent-green);
}

.terminal-indicator .dot {
  width: 6px;
  height: 6px;
  background: var(--neon-green);
  box-shadow: 0 0 8px var(--neon-green);
  animation: pulse 1.2s ease-in-out infinite;
}

.terminal-body {
  padding: 20px 24px 24px;
  flex: 1;
  overflow-y: auto;
  font-family: var(--font-mono);
  font-size: 12.5px;
  line-height: 1.9;
}

.terminal-body::-webkit-scrollbar {
  width: 3px;
}
.terminal-body::-webkit-scrollbar-track {
  background: transparent;
}
.terminal-body::-webkit-scrollbar-thumb {
  background: var(--border-light);
}

.terminal-line {
  animation: term-line-in 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  display: flex;
  gap: 10px;
  align-items: baseline;
  flex-wrap: wrap;
  padding: 2px 0;
}

@keyframes term-line-in {
  from { opacity: 0; transform: translateX(-8px); }
  to { opacity: 1; transform: translateX(0); }
}

.term-time {
  color: var(--text-meta);
  flex-shrink: 0;
}

.term-agent {
  font-weight: 500;
  flex-shrink: 0;
}

.term-agent.cyan { color: var(--accent-cyan); }
.term-agent.pink { color: var(--accent-pink); }
.term-agent.green { color: var(--accent-green); }
.term-agent.amber { color: var(--accent-amber); }
.term-agent.violet { color: var(--accent-violet); }

.term-arrow {
  color: var(--accent-yellow);
  flex-shrink: 0;
}

.term-msg {
  color: var(--text);
  font-weight: 300;
}

.term-msg .hi { color: var(--accent-yellow); }

.terminal-cursor {
  display: inline-block;
  color: var(--accent-yellow);
  animation: blink 1s step-end infinite;
  font-weight: 300;
  margin-top: 4px;
}

@media (max-width: 900px) {
  .system-grid { grid-template-columns: 1fr; }
  .phase-nav { flex-direction: column; }
  .system-status-bar { grid-template-columns: repeat(2, 1fr); }
  .terminal { min-height: 420px; }
}

@media (max-width: 480px) {
  .terminal-body { padding: 14px 16px 18px; font-size: 11.5px; line-height: 1.75; }
  .terminal-title { display: none; }
  .terminal-line { gap: 6px; }
  .phase-card { padding: 16px 18px; }
  .phase-label { font-size: 26px; }
}

.how-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2px;
  position: relative;
}

/* --- Pulse track connecting the three phases --- */
.how-pulse-line {
  position: absolute;
  top: 48px;
  left: 36px;
  right: 36px;
  height: 1px;
  background: linear-gradient(90deg,
    rgba(0, 240, 255, 0.18) 0%,
    rgba(0, 240, 255, 0.18) 33%,
    rgba(255, 45, 107, 0.18) 34%,
    rgba(255, 45, 107, 0.18) 66%,
    rgba(0, 255, 136, 0.18) 67%,
    rgba(0, 255, 136, 0.18) 100%
  );
  pointer-events: none;
  z-index: 3;
  overflow: visible;
}

.how-pulse-dot {
  position: absolute;
  top: -5px;
  width: 11px;
  height: 11px;
  background: var(--neon-cyan);
  box-shadow: 0 0 18px 2px var(--neon-cyan);
  animation: pulse-travel-pos 8s linear infinite,
             pulse-travel-color 8s step-end infinite;
}

.how-pulse-dot::after {
  content: '';
  position: absolute;
  inset: -3px;
  background: inherit;
  opacity: 0.4;
  filter: blur(6px);
}

@keyframes pulse-travel-pos {
  0% { left: 0%; }
  100% { left: calc(100% - 11px); }
}

@keyframes pulse-travel-color {
  0%, 32.99% {
    background: var(--neon-cyan);
    box-shadow: 0 0 18px 2px var(--neon-cyan);
  }
  33%, 65.99% {
    background: var(--neon-pink);
    box-shadow: 0 0 18px 2px var(--neon-pink);
  }
  66%, 100% {
    background: var(--neon-green);
    box-shadow: 0 0 18px 2px var(--neon-green);
  }
}

.how-card {
  background: var(--card);
  border: 1px solid var(--border);
  padding: 48px 36px;
  position: relative;
  z-index: 1;
  transition: background 0.3s cubic-bezier(0.16, 1, 0.3, 1),
              opacity 0.9s cubic-bezier(0.16, 1, 0.3, 1),
              transform 0.9s cubic-bezier(0.16, 1, 0.3, 1);
  opacity: 0;
  transform: translateY(48px);
}

.reveal.visible .how-card { opacity: 1; transform: translateY(0); }
.reveal.visible .how-card:nth-child(2) { transition-delay: 0s; }
.reveal.visible .how-card:nth-child(3) { transition-delay: 0.22s; }
.reveal.visible .how-card:nth-child(4) { transition-delay: 0.44s; }

.how-pulse-line {
  opacity: 0;
  transition: opacity 0.6s ease 0.8s;
}
.reveal.visible .how-pulse-line { opacity: 1; }

.how-card:hover {
  background: var(--surface-raised);
}

@media (max-width: 900px) {
  .how-pulse-line { display: none; }
}

.how-card-number {
  font-family: var(--font-display);
  font-size: 96px;
  color: var(--border);
  position: absolute;
  top: 12px;
  right: 20px;
  line-height: 1;
  opacity: 0.5;
}

.how-card-accent {
  width: 100%;
  height: 2px;
  margin-bottom: 32px;
}

.how-card:nth-child(2) .how-card-accent { background: var(--neon-cyan); }
.how-card:nth-child(3) .how-card-accent { background: var(--neon-pink); }
.how-card:nth-child(4) .how-card-accent { background: var(--neon-green); }

.how-card-label {
  font-family: var(--font-display);
  font-size: 36px;
  color: var(--white);
  margin-bottom: 20px;
}

.how-card-body {
  font-size: 15px;
  font-weight: 300;
  color: var(--text-dim);
  line-height: 1.8;
}

.how-card-detail {
  margin-top: 24px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
}

.how-card-detail-item {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.05em;
  padding: 5px 0;
  display: flex;
  align-items: center;
  gap: 8px;
}

.how-card:nth-child(2) .how-card-detail-item { color: var(--accent-cyan); }
.how-card:nth-child(3) .how-card-detail-item { color: var(--accent-pink); }
.how-card:nth-child(4) .how-card-detail-item { color: var(--accent-green); }

.how-card-detail-item .bullet {
  display: inline-block;
  width: 4px;
  height: 4px;
  flex-shrink: 0;
}

.how-card:nth-child(2) .how-card-detail-item .bullet { background: var(--neon-cyan); }
.how-card:nth-child(3) .how-card-detail-item .bullet { background: var(--neon-pink); }
.how-card:nth-child(4) .how-card-detail-item .bullet { background: var(--neon-green); }

@media (max-width: 900px) {
  .how-grid { grid-template-columns: 1fr; }
}

/* ============================================================
   30 DAY QUEST
   ============================================================ */
.quest-section {
  background: var(--black);
}

.quest-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 80px;
  flex-wrap: wrap;
  gap: 16px;
}

.quest-title {
  font-family: var(--font-display);
  font-size: clamp(48px, 6vw, 80px);
  color: var(--white);
  line-height: 0.9;
}

.quest-comment {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-meta);
}

.quest-timeline {
  position: relative;
  margin-top: 40px;
  padding: 0 80px;
  height: 200px;
}

.quest-line {
  position: absolute;
  left: 80px;
  right: 80px;
  top: 18px;
  height: 1px;
  background: var(--border-light);
}

.quest-line-fill {
  position: absolute;
  left: 80px;
  top: 17px;
  height: 3px;
  width: 0;
  background: linear-gradient(90deg, rgba(0, 240, 255, 0.05), var(--neon-cyan));
  box-shadow: 0 0 10px rgba(0, 240, 255, 0.6);
  animation: questFill 14s ease-in-out infinite;
  pointer-events: none;
}

@keyframes questFill {
  0%, 4%   { width: 0; opacity: 0; }
  10%      { opacity: 1; }
  90%      { width: calc(100% - 160px); opacity: 1; }
  100%     { width: calc(100% - 160px); opacity: 0; }
}

.quest-cursor {
  position: absolute;
  top: 11px;
  left: 80px;
  width: 14px;
  height: 14px;
  margin-left: -7px;
  background: var(--neon-cyan);
  border-radius: 50%;
  box-shadow: 0 0 14px var(--neon-cyan), 0 0 28px var(--neon-cyan), 0 0 50px rgba(0, 240, 255, 0.6);
  animation: questTravel 14s ease-in-out infinite;
  pointer-events: none;
}

@keyframes questTravel {
  0%, 4%   { left: 80px; opacity: 0; }
  10%      { opacity: 1; transform: scale(1); }
  90%      { left: calc(100% - 80px); opacity: 1; transform: scale(1); }
  92%      { transform: scale(1.6); }
  100%     { left: calc(100% - 80px); opacity: 0; }
}

.quest-milestones {
  list-style: none;
  margin: 0;
  padding: 0;
  position: relative;
  height: 100%;
}

.qm {
  position: absolute;
  top: 0;
  left: var(--qm-pos);
  transform: translateX(-50%);
  text-align: center;
  width: 170px;
}

.qm-dot {
  display: block;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--border);
  border: 1px solid var(--border-light);
  margin: 14px auto 18px;
  position: relative;
  z-index: 2;
}

.qm.active .qm-dot {
  background: var(--neon-cyan);
  border-color: var(--accent-cyan);
  box-shadow: 0 0 12px var(--neon-cyan), 0 0 28px rgba(0, 240, 255, 0.5);
  animation: questPulse 1.8s ease-in-out infinite;
}

@keyframes questPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.qm-day {
  display: block;
  font-family: var(--font-mono);
  font-size: 13px;
  letter-spacing: 0.18em;
  color: var(--text-meta);
  margin-bottom: 8px;
}

.qm.active .qm-day { color: var(--accent-cyan); }

.qm-name {
  display: block;
  font-family: var(--font-display);
  font-size: 19px;
  letter-spacing: 0.04em;
  color: var(--text-dim);
  line-height: 1.15;
}

.qm.active .qm-name {
  color: var(--white);
  text-shadow: 0 0 16px rgba(0, 240, 255, 0.3);
}

@media (max-width: 900px) {
  .quest-timeline {
    height: auto;
    padding: 0;
    margin-top: 32px;
  }
  .quest-line, .quest-line-fill, .quest-cursor { display: none; }
  .quest-milestones {
    height: auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
    border-left: 1px solid var(--border-light);
    padding-left: 20px;
  }
  .qm {
    position: static;
    transform: none;
    text-align: left;
    width: 100%;
    display: grid;
    grid-template-columns: 12px 80px 1fr;
    gap: 14px;
    align-items: center;
  }
  .qm-dot { margin: 0; }
  .qm-day { margin: 0; }
  .qm-name { font-size: 18px; }
  .qm-name br { display: none; }
}

  right: 0;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s cubic-bezier(0.16, 1, 0.3, 1);
}

.dept-card:hover .dept-outputs-view {
  opacity: 0;
  pointer-events: none;
}

.dept-card:hover .dept-agents-view {
  opacity: 1;
  pointer-events: auto;
}

.dept-agents-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-top: 10px;
}

.dept-agent-item {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  opacity: 0;
  transform: translateX(-6px);
  transition: opacity 0.35s cubic-bezier(0.16, 1, 0.3, 1),
              transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
}

.dept-card:hover .dept-agent-item {
  opacity: 1;
  transform: translateX(0);
}

.dept-card:hover .dept-agent-item:nth-child(1) { transition-delay: 0.10s; }
.dept-card:hover .dept-agent-item:nth-child(2) { transition-delay: 0.18s; }
.dept-card:hover .dept-agent-item:nth-child(3) { transition-delay: 0.26s; }
.dept-card:hover .dept-agent-item:nth-child(4) { transition-delay: 0.34s; }
.dept-card:hover .dept-agent-item:nth-child(5) { transition-delay: 0.42s; }

.dept-agent-dot {
  width: 6px;
  height: 6px;
  background: var(--neon-green);
  box-shadow: 0 0 6px var(--neon-green);
  flex-shrink: 0;
  animation: pulse 1.5s ease-in-out infinite;
}

.dept-agent-status {
  margin-left: auto;
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--accent-green);
}

.dept-card-outputs-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  color: var(--text-meta);
  margin-bottom: 10px;
}

.dept-card-outputs-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.dept-output-tag {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.06em;
  color: var(--text);
  padding: 4px 9px;
  border: 1px solid var(--border-light);
  background: var(--lift-1);
  transition: all 0.2s;
}

.dept-card:hover .dept-output-tag {
  color: var(--white);
  border-color: var(--text-dim);
  background: var(--lift-2);
}

.dept-customize-banner {
  margin-top: 2px;
  padding: 22px 28px;
  border: 1px solid var(--border);
  background: var(--card);
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.06em;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}

.dept-customize-marker {
  color: var(--accent-yellow);
  margin-right: 10px;
  font-weight: 500;
}

.dept-customize-end {
  color: var(--accent-yellow);
  font-style: italic;
  margin-left: auto;
  letter-spacing: 0.08em;
}

@media (max-width: 1000px) {
  .dept-grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 640px) {
  .dept-grid { grid-template-columns: 1fr; }
  .dept-customize-banner { flex-direction: column; align-items: flex-start; }
  .dept-customize-end { margin-left: 0; }
}

/* ============================================================
   DIAGNOSTIC — The Product Experience
   ============================================================ */
.diag-section {
  background: var(--dark);
  position: relative;
  padding-top: 80px;
}

.diag-section::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--neon-yellow), transparent);
}

.diag-header {
  text-align: left;
  margin-bottom: 60px;
}

.diag-title {
  font-family: var(--font-display);
  font-size: clamp(48px, 6vw, 80px);
  color: var(--white);
  line-height: 0.9;
  margin-bottom: 16px;
}

.diag-sub {
  font-size: 15px;
  font-weight: 300;
  color: var(--text-dim);
  max-width: 560px;
}

/* Diagnostic layout — recon box + spinning car GIF on right */
.diag-layout {
  display: grid;
  grid-template-columns: 1fr minmax(220px, 320px);
  gap: 48px;
  align-items: center;
  max-width: 1120px;
}

.diag-gif {
  position: relative;
}

.diag-gif img {
  width: 100%;
  height: auto;
  display: block;
  opacity: 0.85;
}

@media (max-width: 900px) {
  .diag-layout {
    grid-template-columns: 1fr;
    gap: 32px;
  }
  .diag-gif {
    max-width: 280px;
    margin: 0 auto;
  }
}

/* Diagnostic container */
.diag-container {
  max-width: 760px;
  border: 1px solid var(--border-light);
  background: var(--card);
  position: relative;
}

.diag-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--dark);
}

.diag-topbar-dots {
  display: flex;
  gap: 6px;
}

.diag-topbar-dot {
  width: 8px;
  height: 8px;
  border: 1px solid var(--border-light);
}

.diag-topbar-dot:nth-child(1) { background: #ff5f57; border-color: #ff5f57; }
.diag-topbar-dot:nth-child(2) { background: #ffbd2e; border-color: #ffbd2e; }
.diag-topbar-dot:nth-child(3) { background: #28c840; border-color: #28c840; }

.diag-topbar-title {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-meta);
  letter-spacing: 0.08em;
}

.diag-topbar-status {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.diag-body {
  padding: 48px 40px;
  min-height: 400px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

@media (max-width: 768px) {
  .diag-body { padding: 32px 20px; }
}

/* Step transitions */
.diag-step {
  animation: diag-fade-in 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes diag-fade-in {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Step: inputs */
.diag-question {
  font-family: var(--font-body);
  font-size: 20px;
  font-weight: 300;
  color: var(--white);
  margin-bottom: 32px;
  line-height: 1.5;
}

.diag-input-group {
  margin-bottom: 24px;
}

.diag-input-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-meta);
  margin-bottom: 8px;
}

.diag-input {
  width: 100%;
  padding: 14px 0;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border-light);
  color: var(--white);
  font-family: var(--font-body);
  font-size: 16px;
  font-weight: 300;
  outline: none;
  transition: border-color 0.2s;
}

.diag-input:focus {
  border-bottom-color: var(--neon-yellow);
}

.diag-input::placeholder {
  color: var(--text-meta);
  font-style: italic;
}

.diag-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 40px;
}

.diag-step-indicator {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-meta);
  letter-spacing: 0.08em;
}

.diag-next {
  padding: 14px 28px;
  background: var(--neon-yellow);
  color: var(--on-accent);
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border: none;
  cursor: pointer;
  transition: all 0.2s;
}

.diag-next:hover {
  background: var(--btn-hover-bg);
  color: var(--btn-hover-fg);
  transform: translate(-1px, -1px);
  box-shadow: 2px 2px 0 var(--neon-yellow);
}

.diag-next:disabled {
  opacity: 0.3;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

.diag-back {
  background: none;
  border: none;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-meta);
  cursor: pointer;
  letter-spacing: 0.06em;
  transition: color 0.2s;
}

.diag-back:hover { color: var(--text); }

/* --- Bottleneck chip selector --- */
.diag-chips {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-top: 6px;
}

.diag-chip {
  font-family: var(--font-mono);
  font-size: 13px;
  letter-spacing: 0.04em;
  color: var(--text);
  background: var(--lift-1);
  border: 1px solid var(--text-meta);
  padding: 14px 16px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 10px;
}

.diag-chip:hover {
  color: var(--white);
  border-color: var(--text-dim);
  background: var(--lift-2);
}

.diag-chip .chip-marker {
  display: inline-block;
  width: 7px;
  height: 7px;
  background: var(--text-meta);
  flex-shrink: 0;
  transition: background 0.2s;
}

.diag-chip.selected {
  border-color: var(--chip-color, var(--neon-yellow));
  color: var(--white);
  background: var(--chip-bg, rgba(232, 255, 0, 0.06));
}

.diag-chip.selected .chip-marker {
  background: var(--chip-color, var(--neon-yellow));
  box-shadow: 0 0 8px var(--chip-color, var(--neon-yellow));
}

@media (max-width: 600px) {
  .diag-chips { grid-template-columns: 1fr; }
}

/* --- Output briefs grid --- */
.diag-briefs-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 2px;
  margin-top: 4px;
}

.diag-brief-card {
  background: var(--black);
  border: 1px solid var(--border);
  padding: 18px 20px;
  position: relative;
}

.diag-brief-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 2px;
  height: 100%;
}

.diag-brief-card:nth-child(1)::before { background: var(--neon-cyan); }
.diag-brief-card:nth-child(2)::before { background: var(--neon-pink); }
.diag-brief-card:nth-child(3)::before { background: var(--neon-green); }

.diag-brief-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.diag-brief-platform {
  color: var(--text);
  font-weight: 500;
}

.diag-brief-platform .format {
  color: var(--text-meta);
  margin-left: 8px;
}

.diag-brief-urgency {
  color: var(--accent-yellow);
  border: 1px solid var(--line-yellow-03);
  padding: 3px 8px;
}

.diag-brief-hook {
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--accent-yellow);
  font-style: italic;
  font-weight: 400;
  margin-bottom: 10px;
  line-height: 1.5;
}

.diag-brief-row {
  display: grid;
  grid-template-columns: 70px 1fr;
  gap: 12px;
  padding: 4px 0;
  font-size: 12px;
  line-height: 1.55;
}

.diag-brief-row-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-meta);
  padding-top: 2px;
}

.diag-brief-row-value {
  color: var(--text);
  font-weight: 300;
}

.diag-brief-row.why .diag-brief-row-value {
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 11px;
  border-top: 1px dashed var(--border);
  padding-top: 8px;
  margin-top: 4px;
}

/* --- Bottleneck tag in output header --- */
.diag-output-bottleneck {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-dim);
  padding: 4px 8px;
  background: var(--lift-1);
  border: 1px solid var(--border);
  margin-top: 8px;
}

.diag-output-bottleneck .tag-dot {
  width: 6px;
  height: 6px;
}

/* ============================================================
   RUN TERMINAL (processing view)
   ============================================================ */
.run-terminal {
  border: 1px solid var(--border-light);
  background: var(--black);
  min-height: 440px;
  display: flex;
  flex-direction: column;
}

.run-terminal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 18px;
  background: var(--surface-deep);
  border-bottom: 1px solid var(--border);
  gap: 12px;
}

.run-terminal-body {
  padding: 24px;
  flex: 1;
  overflow-y: auto;
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 2;
  max-height: 480px;
}

.run-terminal-body::-webkit-scrollbar { width: 3px; }
.run-terminal-body::-webkit-scrollbar-thumb { background: var(--border-light); }

.run-term-mark {
  flex-shrink: 0;
  font-weight: 500;
  width: 14px;
  display: inline-block;
  text-align: center;
}

.run-term-mark.green { color: var(--accent-green); }
.run-term-mark.yellow { color: var(--accent-yellow); }
.run-term-mark.cyan { color: var(--accent-cyan); }
.run-term-mark.pink { color: var(--accent-pink); }
.run-term-mark.amber { color: var(--accent-amber); }
.run-term-mark.violet { color: var(--accent-violet); }
.run-term-mark.meta { color: var(--text-meta); }

/* ============================================================
   RECON OUTPUT — new dope treatment
   ============================================================ */
.recon-output {
  border: 1px solid var(--border-light);
  background: var(--dark);
}

/* Header */
.recon-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 16px;
  padding: 24px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}

.recon-head-left {
  flex: 1;
  min-width: 260px;
}

.recon-head-title {
  font-family: var(--font-display);
  font-size: 26px;
  color: var(--white);
  letter-spacing: 0.05em;
  line-height: 1.05;
}

.recon-head-tag {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-top: 10px;
  padding: 5px 10px;
  background: var(--lift-1);
  border: 1px solid var(--border);
}

.recon-head-tag .tag-dot { width: 6px; height: 6px; }

.recon-head-badge {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--accent-green);
  border: 1px solid var(--line-green-035);
  padding: 5px 10px;
  flex-shrink: 0;
}

/* Department Routing Panel */
.recon-dept-panel {
  padding: 28px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--card);
}

.recon-dept-routing {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.14em;
}

.routing-arrow {
  color: var(--accent-yellow);
  font-size: 14px;
}

.recon-dept-card {
  background: var(--black);
  border: 1px solid var(--border-light);
  padding: 20px 22px;
  position: relative;
}

.recon-dept-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 4px;
  flex-wrap: wrap;
  gap: 12px;
}

.recon-dept-name {
  font-family: var(--font-display);
  font-size: 26px;
  letter-spacing: 0.04em;
  line-height: 1;
}

.recon-dept-status {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--accent-green);
}

.recon-dept-status .pulse-dot {
  width: 7px;
  height: 7px;
  background: var(--neon-green);
  box-shadow: 0 0 8px var(--neon-green);
  animation: pulse 1.5s ease-in-out infinite;
}

.recon-dept-tagline {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-meta);
  letter-spacing: 0.04em;
  margin-bottom: 18px;
}

.recon-agent-list {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 6px 20px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}

.recon-agent {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.04em;
  padding: 4px 0;
  opacity: 0;
  animation: agent-online 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

@keyframes agent-online {
  from { opacity: 0; transform: translateX(-6px); }
  to { opacity: 1; transform: translateX(0); }
}

.recon-agent-status {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--accent-green);
  letter-spacing: 0.1em;
}

/* Intel Cards Grid */
.recon-intel-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0;
  border-bottom: 1px solid var(--border);
}

.recon-intel-card {
  padding: 22px 22px;
  border-right: 1px solid var(--border);
  background: var(--dark);
}

.recon-intel-card:last-child { border-right: none; }

.recon-intel-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.recon-intel-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
}

.recon-intel-label.cyan { color: var(--accent-cyan); }
.recon-intel-label.pink { color: var(--accent-pink); }
.recon-intel-label.green { color: var(--accent-green); }

.recon-intel-tag {
  font-family: var(--font-display);
  font-size: 18px;
  color: var(--white);
  letter-spacing: 0.04em;
}

.recon-intel-text {
  font-size: 13px;
  font-weight: 300;
  color: var(--text);
  line-height: 1.55;
}

@media (max-width: 768px) {
  .recon-intel-grid { grid-template-columns: 1fr; }
  .recon-intel-card { border-right: none; border-bottom: 1px solid var(--border); }
  .recon-intel-card:last-child { border-bottom: none; }
}

/* Briefs Section */
.recon-briefs-section {
  padding: 24px;
}

.recon-briefs-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 16px;
  flex-wrap: wrap;
  gap: 8px;
}

.recon-briefs-title {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--accent-amber);
}

.recon-briefs-bar {
  display: inline-block;
  width: 24px;
  height: 2px;
  background: var(--neon-amber);
}

.recon-briefs-meta {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--text-meta);
}

.recon-briefs-stack {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
}

.recon-brief {
  background: var(--black);
  border: 1px solid var(--border-light);
  padding: 20px 22px;
  position: relative;
}

.recon-brief::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 3px;
  height: 100%;
}

.recon-brief:nth-child(1)::before { background: var(--neon-cyan); }
.recon-brief:nth-child(2)::before { background: var(--neon-pink); }
.recon-brief:nth-child(3)::before { background: var(--neon-green); }

.recon-brief-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 10px;
  flex-wrap: wrap;
  gap: 8px;
}

.recon-brief-id {
  display: flex;
  align-items: baseline;
  gap: 14px;
  font-family: var(--font-mono);
  letter-spacing: 0.08em;
}

.recon-brief-num {
  font-size: 11px;
  color: var(--text-meta);
}

.recon-brief-type {
  font-size: 11px;
  color: var(--white);
  text-transform: uppercase;
  font-weight: 500;
}

.recon-brief-urgency {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--accent-yellow);
  border: 1px solid var(--line-yellow-03);
  padding: 3px 9px;
}

.recon-brief-title {
  font-family: var(--font-body);
  font-size: 17px;
  font-weight: 400;
  color: var(--white);
  line-height: 1.3;
  margin-bottom: 14px;
}

.recon-brief-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 0;
  border-top: 1px solid var(--border);
  border-bottom: 1px dashed var(--border);
  margin-bottom: 14px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.06em;
}

.recon-brief-meta .mono {
  font-size: 10px;
  letter-spacing: 0.14em;
}

.recon-brief-platform {
  color: var(--text);
}

.recon-brief-rows {
  display: flex;
  flex-direction: column;
}

.recon-brief-row {
  display: grid;
  grid-template-columns: 100px 1fr;
  gap: 16px;
  padding: 10px 0;
  align-items: baseline;
  border-top: 1px solid var(--border);
  font-size: 13px;
  line-height: 1.55;
}

.recon-brief-row:first-child { border-top: none; }

.recon-brief-k {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-meta);
  padding-top: 1px;
  align-self: start;
}

.recon-brief-v {
  font-size: 13px;
  color: var(--text);
  font-weight: 300;
  line-height: 1.6;
  min-width: 0;
  word-wrap: break-word;
}

.recon-brief-v.hl {
  color: var(--accent-yellow);
  font-style: italic;
}

.recon-brief-why {
  display: flex;
  gap: 14px;
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px dashed var(--border);
  align-items: baseline;
}

.recon-brief-why-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--accent-green);
  flex-shrink: 0;
}

.recon-brief-why-text {
  font-family: var(--font-mono);
  font-size: 11px;
  line-height: 1.6;
  color: var(--text-dim);
}

.recon-footer {
  padding: 18px 24px;
  border-top: 1px solid var(--border);
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-dim);
  font-style: italic;
}

@media (max-width: 600px) {
  .recon-brief-row {
    grid-template-columns: 1fr;
    gap: 4px;
    padding: 12px 0;
  }
  .recon-brief-k {
    padding-top: 0;
    padding-bottom: 2px;
  }
}

/* ============================================================
   MULTI-DEPT ROUTING PANEL
   ============================================================ */
.recon-dept-summary {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--accent-yellow);
  padding: 3px 10px;
  border: 1px solid var(--line-yellow-035);
  margin-left: auto;
}

.recon-dept-cards-grid {
  display: grid;
  gap: 10px;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
}

.recon-dept-cards-grid[data-count="1"] { grid-template-columns: 1fr; }

.recon-dept-agent-count {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--text-meta);
  text-transform: uppercase;
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}

.recon-dept-card .recon-agent-list {
  grid-template-columns: 1fr;
  padding-top: 0;
  border-top: none;
}

/* ============================================================
   BRIEF TYPE BADGE + ACCENTS
   ============================================================ */
.recon-brief-typebadge {
  display: inline-flex;
  align-items: center;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.14em;
  padding: 3px 8px;
  border: 1px solid;
}

.recon-brief-typebadge.accent-cyan   { color: var(--accent-cyan);   border-color: var(--line-cyan-035);  background: var(--wash-cyan-005); }
.recon-brief-typebadge.accent-pink   { color: var(--accent-pink);   border-color: var(--line-pink-035); background: var(--wash-pink-005); }
.recon-brief-typebadge.accent-green  { color: var(--accent-green);  border-color: var(--line-green-035);  background: var(--wash-green-005); }
.recon-brief-typebadge.accent-violet { color: var(--accent-violet); border-color: var(--line-violet-04);  background: var(--wash-violet-006); }
.recon-brief-typebadge.accent-amber  { color: var(--accent-amber);  border-color: var(--line-amber-035);  background: var(--wash-amber-005); }
.recon-brief-typebadge.accent-yellow { color: var(--accent-yellow); border-color: var(--line-yellow-035);  background: var(--wash-yellow-005); }

.recon-brief-subtype {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-meta);
  letter-spacing: 0.1em;
}

.recon-brief-meta-k {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--text-meta);
}

.recon-brief-meta-v {
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 12px;
}

/* Brief cards get accent-colored left border based on type */
.recon-brief[data-accent="cyan"]::before   { background: var(--neon-cyan); }
.recon-brief[data-accent="pink"]::before   { background: var(--neon-pink); }
.recon-brief[data-accent="green"]::before  { background: var(--neon-green); }
.recon-brief[data-accent="violet"]::before { background: var(--neon-violet); }
.recon-brief[data-accent="amber"]::before  { background: var(--neon-amber); }
.recon-brief[data-accent="yellow"]::before { background: var(--neon-yellow); }

/* Keep nth-child fallback but data-accent overrides */

/* ============================================================
   STRATEGY DOC — Pillar Grid + Mix
   ============================================================ */
.recon-pillar-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 2px;
  margin-top: 16px;
  border: 1px solid var(--border);
  background: var(--border);
}

.recon-pillar {
  display: flex;
  gap: 14px;
  padding: 14px 16px;
  background: var(--dark);
  align-items: flex-start;
}

.recon-pillar-num {
  font-family: var(--font-display);
  font-size: 22px;
  color: var(--accent-cyan);
  line-height: 1;
  flex-shrink: 0;
  width: 28px;
}

.recon-pillar-name {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--white);
  margin-bottom: 4px;
  font-weight: 500;
}

.recon-pillar-desc {
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.5;
  font-weight: 300;
}

.recon-mix {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2px;
  margin-top: 16px;
  border: 1px solid var(--border);
  background: var(--border);
}

.recon-mix-item {
  padding: 14px 16px;
  background: var(--dark);
  text-align: center;
}

.recon-mix-pct {
  font-family: var(--font-display);
  font-size: 32px;
  color: var(--white);
  line-height: 1;
  margin-bottom: 2px;
}

.recon-mix-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--accent-cyan);
  margin-bottom: 6px;
}

.recon-mix-note {
  font-size: 11px;
  color: var(--text-meta);
  line-height: 1.4;
  font-weight: 300;
}

@media (max-width: 600px) {
  .recon-pillar-grid, .recon-mix { grid-template-columns: 1fr; }
}

/* ============================================================
   POSITIONING DOC — Thesis + Angles
   ============================================================ */
.recon-thesis {
  padding: 16px 18px;
  border: 1px solid var(--border);
  background: var(--wash-green-003);
  margin-top: 16px;
}

.recon-thesis-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  color: var(--accent-green);
}

.recon-thesis-text {
  font-size: 14px;
  color: var(--text);
  line-height: 1.6;
  margin-top: 8px;
  font-weight: 300;
}

.recon-angles {
  margin-top: 14px;
  display: grid;
  grid-template-columns: 1fr;
  gap: 2px;
  border: 1px solid var(--border);
  background: var(--border);
}

.recon-angle {
  padding: 14px 16px;
  background: var(--dark);
}

.recon-angle-head {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 6px;
}

.recon-angle-num {
  font-family: var(--font-display);
  font-size: 18px;
  color: var(--accent-green);
  line-height: 1;
}

.recon-angle-name {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  color: var(--white);
  font-weight: 500;
}

.recon-angle-claim {
  font-size: 14px;
  color: var(--accent-yellow);
  font-style: italic;
  font-weight: 300;
  margin: 6px 0 4px;
}

.recon-angle-proof {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-dim);
  line-height: 1.5;
}

/* ============================================================
   HYBRID BRIEF — Creative + Media split
   ============================================================ */
.recon-hybrid-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 2px;
  margin-top: 14px;
  border: 1px solid var(--border);
  background: var(--border);
}

.recon-hybrid-col {
  padding: 16px 18px;
  background: var(--dark);
}

.recon-hybrid-head {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  margin-bottom: 12px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}

.recon-hybrid-head.accent-pink { color: var(--accent-pink); }
.recon-hybrid-head.accent-violet { color: var(--accent-violet); }

.recon-hybrid-row {
  display: grid;
  grid-template-columns: 80px 1fr;
  gap: 10px;
  padding: 5px 0;
  font-size: 12px;
  line-height: 1.5;
}

.recon-hybrid-row .hk {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-meta);
  padding-top: 2px;
}

.recon-hybrid-row .hv {
  color: var(--text);
  font-weight: 300;
}

.recon-hybrid-row .hv.hl {
  color: var(--accent-yellow);
  font-style: italic;
}

@media (max-width: 700px) {
  .recon-hybrid-grid { grid-template-columns: 1fr; }
  .recon-hybrid-row { grid-template-columns: 70px 1fr; }
}

/* ============================================================
   LIFECYCLE — Sequence visualizer
   ============================================================ */
.recon-sequence {
  margin-top: 16px;
  padding: 14px 16px;
  border: 1px solid var(--border);
  background: var(--wash-amber-0025);
}

.recon-sequence-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  color: var(--accent-amber);
  margin-bottom: 12px;
}

.recon-seq-step {
  display: grid;
  grid-template-columns: 70px 1fr;
  gap: 14px;
  padding: 10px 0;
  border-top: 1px solid var(--border);
  align-items: start;
}

.recon-seq-step:first-of-type { border-top: none; padding-top: 0; }

.recon-seq-day {
  font-family: var(--font-display);
  font-size: 20px;
  color: var(--white);
  line-height: 1;
  letter-spacing: 0.04em;
}

.recon-seq-hook {
  font-size: 13px;
  color: var(--accent-yellow);
  font-style: italic;
  line-height: 1.4;
  margin-bottom: 4px;
}

.recon-seq-purpose {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  color: var(--text-meta);
  text-transform: uppercase;
}

/* Step: processing */
.diag-processing {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text-dim);
  line-height: 2.2;
}

.diag-proc-line {
  opacity: 0;
  animation: proc-line-in 0.4s ease forwards;
}

.diag-proc-line .check {
  color: var(--accent-green);
  margin-right: 6px;
}

.diag-proc-line .arrow {
  color: var(--accent-yellow);
  margin-right: 6px;
}

.diag-progress-bar {
  width: 100%;
  height: 2px;
  background: var(--border);
  margin: 24px 0;
  overflow: hidden;
}

.diag-progress-fill {
  height: 100%;
  background: var(--neon-yellow);
  animation: progress-fill 4s ease-in-out forwards;
}

@keyframes progress-fill {
  0% { width: 0%; }
  30% { width: 35%; }
  60% { width: 65%; }
  85% { width: 88%; }
  100% { width: 100%; }
}

@keyframes proc-line-in {
  from { opacity: 0; transform: translateX(-8px); }
  to { opacity: 1; transform: translateX(0); }
}

/* Step: output */
.diag-output {
  border: 1px solid var(--border-light);
  background: var(--dark);
}

.diag-output-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 16px;
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}

.diag-output-title {
  font-family: var(--font-display);
  font-size: 20px;
  color: var(--white);
  letter-spacing: 0.06em;
}

.diag-output-badge {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent-green);
  border: 1px solid var(--line-green-03);
  padding: 4px 10px;
}

.diag-output-body {
  padding: 28px 24px;
}

.diag-output-section {
  margin-bottom: 28px;
}

.diag-output-section:last-child { margin-bottom: 0; }

.diag-output-section-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.diag-output-section-label.cyan { color: var(--accent-cyan); }
.diag-output-section-label.pink { color: var(--accent-pink); }
.diag-output-section-label.green { color: var(--accent-green); }
.diag-output-section-label.amber { color: var(--accent-amber); }

.diag-output-text {
  font-size: 14px;
  font-weight: 300;
  color: var(--text);
  line-height: 1.8;
}

.diag-output-divider {
  height: 1px;
  background: var(--border);
  margin: 24px 0;
}

.diag-output-footer {
  padding: 20px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 16px;
}

.diag-output-footer-text {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-dim);
  font-style: italic;
}

.diag-output-ctas {
  display: flex;
  gap: 12px;
  margin-top: 32px;
  flex-wrap: wrap;
}

/* ============================================================
   PROOF — Case Study / Social Proof
   ============================================================ */
.proof-section {
  background: var(--black);
}

.proof-header {
  margin-bottom: 60px;
}

.proof-title {
  font-family: var(--font-display);
  font-size: clamp(42px, 5vw, 64px);
  color: var(--white);
  line-height: 0.9;
  margin-bottom: 12px;
}

.proof-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 2px;
}

.proof-stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  padding: 40px 32px;
  text-align: center;
}

.proof-stat-num {
  font-family: var(--font-display);
  font-size: 64px;
  color: var(--white);
  line-height: 1;
  margin-bottom: 8px;
}

.proof-stat-label {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
}

.proof-stat-detail {
  font-size: 13px;
  font-weight: 300;
  color: var(--text-meta);
  margin-top: 12px;
}

.proof-quote-card {
  background: var(--card);
  border: 1px solid var(--border);
  padding: 40px 32px;
  grid-column: 1 / -1;
}

.proof-quote {
  font-size: 22px;
  font-weight: 300;
  color: var(--text);
  line-height: 1.6;
  font-style: italic;
  margin-bottom: 20px;
}

.proof-quote-attr {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-meta);
  letter-spacing: 0.06em;
}

@media (max-width: 768px) {
  .proof-grid { grid-template-columns: 1fr; }
}

/* Case Studies coming soon */
.coming-soon-card {
  background: var(--card);
  border: 1px solid var(--border-light);
  padding: 60px 48px;
  position: relative;
  overflow: hidden;
  max-width: 820px;
}

.coming-soon-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 2px;
  background: linear-gradient(90deg, var(--neon-yellow) 0%, var(--neon-pink) 50%, var(--neon-cyan) 100%);
}

.coming-soon-badge {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--accent-yellow);
  border: 1px solid var(--line-yellow-03);
  padding: 6px 12px;
  margin-bottom: 32px;
}

.coming-soon-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  background: var(--neon-yellow);
  animation: pulse 1.6s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.8); }
}

.coming-soon-title {
  font-family: var(--font-display);
  font-size: clamp(32px, 4vw, 52px);
  color: var(--white);
  line-height: 0.95;
  margin-bottom: 24px;
}

.coming-soon-title .yellow { color: var(--accent-yellow); }

.coming-soon-body {
  font-size: 16px;
  font-weight: 300;
  color: var(--text-dim);
  line-height: 1.7;
  max-width: 620px;
  margin-bottom: 40px;
}

.coming-soon-meta {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2px;
  border-top: 1px solid var(--border);
  padding-top: 28px;
}

.coming-soon-meta-item {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.coming-soon-meta-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-meta);
}

.coming-soon-meta-value {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text);
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

@media (max-width: 768px) {
  .coming-soon-card { padding: 40px 24px; }
  .coming-soon-meta { grid-template-columns: 1fr; gap: 16px; }
}

/* ============================================================
   ABOUT / PHILOSOPHY
   ============================================================ */
.about-section {
  background: var(--dark);
}

.about-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
}

.about-left-title {
  font-family: var(--font-display);
  font-size: clamp(42px, 5vw, 64px);
  color: var(--white);
  line-height: 0.9;
  margin-bottom: 24px;
}

.about-left-body {
  font-size: 16px;
  font-weight: 300;
  color: var(--text-dim);
  line-height: 1.8;
  margin-bottom: 32px;
}

.about-principles {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.about-principle {
  display: flex;
  gap: 16px;
  align-items: baseline;
  padding: 16px 0;
  border-bottom: 1px solid var(--border);
}

.about-principle-num {
  font-family: var(--font-display);
  font-size: 32px;
  color: var(--border-light);
  flex-shrink: 0;
  width: 40px;
}

.about-principle-text {
  font-size: 14px;
  font-weight: 400;
  color: var(--text);
}

.about-principle-text strong {
  color: var(--white);
}

.about-principle-text span {
  color: var(--text-dim);
  font-weight: 300;
}

@media (max-width: 900px) {
  .about-layout {
    grid-template-columns: 1fr;
    gap: 40px;
  }
}

/* ============================================================
   CTA / FOOTER
   ============================================================ */
.cta-section {
  background: var(--black);
  text-align: center;
  padding: 120px 40px;
}

.cta-title {
  font-family: var(--font-display);
  font-size: clamp(56px, 8vw, 120px);
  color: var(--white);
  line-height: 0.88;
  margin-bottom: 24px;
}

.cta-title .yellow { color: var(--accent-yellow); }

.cta-sub {
  font-size: 21px;
  font-weight: 300;
  color: var(--text-dim);
  max-width: 640px;
  margin: 0 auto 48px;
  line-height: 1.55;
}

.cta-buttons {
  display: flex;
  justify-content: center;
  gap: 16px;
  flex-wrap: wrap;
}

.footer {
  border-top: 1px solid var(--border);
  padding: 32px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 16px;
}

.footer-left {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-meta);
  letter-spacing: 0.06em;
}

.footer-right {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-meta);
  letter-spacing: 0.06em;
}

/* ============================================================
   DIFFERENCE SECTION
   ============================================================ */
.diff-section {
  background: var(--black);
}

.diff-title {
  font-family: var(--font-display);
  font-size: clamp(42px, 5vw, 64px);
  color: var(--white);
  line-height: 0.9;
  margin-bottom: 60px;
}

.diff-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
}

.diff-col-header {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 16px 24px;
  border: 1px solid var(--border);
}

.diff-col-header.old {
  color: var(--accent-pink);
  background: var(--card);
}

.diff-col-header.new {
  color: var(--accent-yellow);
  background: var(--wash-yellow-004);
  border-left: none;
}

.diff-row {
  display: contents;
}

.diff-cell {
  padding: 20px 24px;
  border: 1px solid var(--border);
  border-top: none;
  font-size: 14px;
  font-weight: 300;
  line-height: 1.6;
}

.diff-cell.old {
  color: var(--diff-old);
  background: var(--card);
}

.diff-cell.new {
  color: var(--text);
  border-left: none;
  background: var(--wash-yellow-002);
}

.diff-principle-tag {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  color: var(--accent-yellow);
  border: 1px solid var(--line-yellow-035);
  padding: 3px 8px;
  margin-bottom: 10px;
  background: var(--wash-yellow-004);
}

.diff-cell-text {
  color: var(--text);
}

@media (max-width: 600px) {
  .diff-grid { grid-template-columns: 1fr; }
  .diff-col-header.new, .diff-cell.new { border-left: 1px solid var(--border); }
}

/* ============================================================
   AGENCIES SECTION
   ============================================================ */
.agencies-section {
  background: var(--black);
  border-top: 1px solid var(--border);
}

.agencies-head {
  margin-bottom: 72px;
}

.agencies-kicker {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.2em;
  color: var(--accent-violet);
  margin-bottom: 24px;
}

.agencies-title {
  font-family: var(--font-display);
  font-size: clamp(48px, 7vw, 84px);
  color: var(--white);
  line-height: 1.02;
  letter-spacing: 0.02em;
}

.agencies-title .violet {
  color: var(--accent-violet);
}

.agencies-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: start;
}

.agencies-pitch-lead {
  font-size: 19px;
  font-weight: 300;
  color: var(--text);
  line-height: 1.6;
  margin-bottom: 36px;
}

.agencies-cta {
  display: inline-flex;
}

.agencies-mechanics {
  display: grid;
  grid-template-columns: 1fr;
  gap: 2px;
  border: 1px solid var(--border);
  background: var(--border);
}

.agencies-mech {
  background: var(--card);
  padding: 26px 28px;
  position: relative;
  transition: background 0.2s;
  display: grid;
  grid-template-columns: 90px 1fr;
  gap: 28px;
  align-items: center;
}

.agencies-mech:hover { background: var(--surface-raised); }

.agencies-mech::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  width: 3px;
  height: 100%;
  background: var(--neon-violet);
  opacity: 0.5;
  transition: opacity 0.2s;
}

.agencies-mech:hover::before { opacity: 1; }

.agencies-mech-num {
  font-family: var(--font-display);
  font-size: 72px;
  color: var(--accent-violet);
  line-height: 0.85;
  letter-spacing: 0.02em;
  text-shadow: 0 0 18px rgba(168, 85, 247, 0.35);
  align-self: center;
}

.agencies-mech-body {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.agencies-mech-label {
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.16em;
  color: var(--white);
  font-weight: 500;
}

.agencies-mech-desc {
  font-size: 13px;
  font-weight: 300;
  color: var(--text-dim);
  line-height: 1.65;
}

@media (max-width: 600px) {
  .agencies-mech {
    grid-template-columns: 64px 1fr;
    gap: 20px;
    padding: 20px 22px;
  }
  .agencies-mech-num { font-size: 52px; }
}

@media (max-width: 900px) {
  .agencies-grid { grid-template-columns: 1fr; gap: 40px; }
}

/* --- Difference section 2-col layout with principles --- */
.diff-layout {
  display: grid;
  grid-template-columns: 1.25fr 1fr;
  gap: 48px;
  align-items: start;
}

@media (max-width: 1000px) {
  .diff-layout { grid-template-columns: 1fr; gap: 40px; }
}

.diff-left { min-width: 0; }
.diff-right { min-width: 0; }

.diff-principles-header {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-meta);
  margin-bottom: 16px;
}

.diff-principles {
  display: flex;
  flex-direction: column;
}

.diff-principle {
  display: flex;
  gap: 18px;
  align-items: baseline;
  padding: 18px 0;
  border-bottom: 1px solid var(--border);
}

.diff-principle:first-child { border-top: 1px solid var(--border); }

.diff-principle-num {
  font-family: var(--font-display);
  font-size: 34px;
  color: var(--border-light);
  flex-shrink: 0;
  width: 44px;
  line-height: 1;
  letter-spacing: 0.02em;
}

.diff-principle-text {
  font-size: 14px;
  font-weight: 400;
  color: var(--text);
  line-height: 1.55;
}

.diff-principle-text strong {
  color: var(--white);
  display: block;
  font-weight: 500;
  margin-bottom: 2px;
}

.diff-principle-text span {
  color: var(--text-dim);
  font-weight: 300;
  font-size: 13.5px;
}

/* ============================================================
   MULTI-BOTTLENECK CHIP UI
   ============================================================ */
.diag-input-label-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
}

.diag-chip-counter {
  font-family: var(--font-mono);
  font-size: 9.5px;
  letter-spacing: 0.18em;
  color: var(--text-meta);
  padding: 3px 8px;
  border: 1px solid var(--border-light);
  background: var(--lift-1);
  text-transform: uppercase;
  transition: all 0.2s;
}

.diag-chip-counter.full {
  color: var(--accent-yellow);
  border-color: var(--accent-yellow);
  background: var(--wash-yellow-006);
}

.diag-chip.disabled {
  opacity: 0.35;
  cursor: not-allowed;
}

.diag-chip.disabled:hover {
  color: var(--text);
  border-color: var(--text-meta);
  background: var(--lift-1);
}

/* ============================================================
   RECON OUTPUT — REDESIGN
   Header eyebrow, bottleneck tags, demoted routing, THE READ
   ============================================================ */

/* New header */
.recon-head-eyebrow {
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--accent-green);
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
}

.recon-head-eyebrow-dot {
  width: 7px;
  height: 7px;
  background: var(--neon-green);
  box-shadow: 0 0 8px var(--neon-green);
  animation: pulse 1.5s ease-in-out infinite;
}

.recon-head-title {
  font-family: var(--font-display);
  font-size: clamp(36px, 4.6vw, 56px);
  color: var(--white);
  letter-spacing: 0.02em;
  line-height: 1;
  margin-bottom: 16px;
}

.recon-head-bottlenecks {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 10px;
}

.recon-head-bottleneck-tag {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 5px 10px;
  border: 1px solid;
  background: var(--lift-1);
}

.recon-head-bottleneck-tag .tag-dot {
  width: 6px;
  height: 6px;
}

/* Demoted routing line */
.recon-routing-line {
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.05em;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.recon-routing-marker {
  color: var(--accent-yellow);
  font-weight: 500;
  flex-shrink: 0;
}

.recon-routing-text strong {
  color: var(--white);
  font-weight: 500;
}

.recon-routing-meta {
  color: var(--text-meta);
}

/* THE READ — compressed intel */
.recon-read {
  padding: 28px 24px 32px;
  border-bottom: 1px solid var(--border);
  background: var(--card);
}

.recon-read-eyebrow {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--accent-yellow);
  margin-bottom: 18px;
}

.recon-read-stack {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.recon-read-line {
  display: grid;
  grid-template-columns: 80px 90px 1fr;
  gap: 16px;
  align-items: baseline;
  padding-bottom: 14px;
  border-bottom: 1px dashed var(--border);
}

.recon-read-line:last-child {
  border-bottom: none;
  padding-bottom: 0;
}

.recon-read-label {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 500;
}

.recon-read-label.cyan { color: var(--accent-cyan); }
.recon-read-label.pink { color: var(--accent-pink); }

.recon-read-tag {

  letter-spacing: 0.04em;
  line-height: 1;
}

.recon-read-text {

}

   ============================================================ */
